services:
  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: signsynth-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: signsynth-postgres
    environment:
      POSTGRES_DB: signsynth
      POSTGRES_USER: signsynth
      POSTGRES_PASSWORD: signsynth_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: signsynth-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: signsynth-backend
    environment:
      - DATABASE_URL=postgresql://signsynth:signsynth_password@postgres:5432/signsynth
      - REDIS_URL=redis://redis:6379
      - STORAGE_TYPE=s3
      - S3_BUCKET=signsynth
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin123
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_REGION=us-east-1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - API_KEY=${API_KEY:-demo-api-key}
      - DEBUG=false
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - backend_uploads:/app/uploads
      - backend_outputs:/app/outputs
      - backend_temp:/app/temp
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker for background processing
  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    container_name: signsynth-worker
    environment:
      - DATABASE_URL=postgresql://signsynth:signsynth_password@postgres:5432/signsynth
      - REDIS_URL=redis://redis:6379
      - STORAGE_TYPE=s3
      - S3_BUCKET=signsynth
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin123
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_REGION=us-east-1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - API_KEY=${API_KEY:-demo-api-key}
      - DEBUG=false
    volumes:
      - ../worker:/app
      - ../backend:/app/backend
      - worker_uploads:/app/uploads
      - worker_outputs:/app/outputs
      - worker_temp:/app/temp
    depends_on:
      - postgres
      - redis
      - minio
      - backend
    restart: unless-stopped
    # Removed the 'deploy' block to fix the error

  # Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: signsynth-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
      - VITE_WEBSOCKET_URL=ws://localhost:8000/ws
      - VITE_API_KEY=${API_KEY:-demo-api-key}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: signsynth-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ../frontend/dist:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  minio_data:
  backend_uploads:
  backend_outputs:
  backend_temp:
  worker_uploads:
  worker_outputs:
  worker_temp: